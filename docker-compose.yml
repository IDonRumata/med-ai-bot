version: "3.9"

services:
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - exports:/app/exports
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports exposed — accessible only within Docker network
    # ports:
    #   - "5432:5432"

volumes:
  pgdata:
  exports:

networks:
  internal:
    driver: bridge
